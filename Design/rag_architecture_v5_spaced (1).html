  .tog.a { background: #FAEEDA; border-color: #EF9F27; color: #633806; }

  svg { display: block; width: 100%; }
  .t  { font-family: inherit; font-size: 14px; fill: #1A1A18; }
  .ts { font-family: inherit; font-size: 12px; fill: #6B6A65; }
  .th { font-family: inherit; font-size: 14px; font-weight: 500; fill: #1A1A18; }
  .node { cursor: pointer; }
  .node:hover { opacity: 0.82; }

  /* colour ramps — light mode only (artifact) */
  .c-amber > rect, .c-amber > circle, .c-amber > ellipse { fill: #FAEEDA; stroke: #EF9F27; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }

  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  .c-coral > rect, .c-coral > circle, .c-coral > ellipse { fill: #FAECE7; stroke: #F0997B; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  .c-green > rect, .c-green > circle, .c-green > ellipse { fill: #EAF3DE; stroke: #97C459; }
  .c-green .th { fill: #27500A; }
  .c-green .ts { fill: #3B6D11; }

  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  .c-red .th { fill: #791F1F; }
  .c-red .ts { fill: #A32D2D; }

  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }

  .box { fill: #F0EEE8; stroke: rgba(0,0,0,0.15); }
  .leader { stroke: rgba(0,0,0,0.2); stroke-width: 0.5px; stroke-dasharray: 4 3; fill: none; }

  .legend-title {
    font-size: 12px;
    font-weight: 500;
    color: #6B6A65;
    margin-top: 1.25rem;
    margin-bottom: 0.5rem;

    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 11.5px;
    color: #6B6A65;

  .leg-line { width: 28px; height: 2px; border-radius: 1px; }
  .leg-dash { width: 28px; height: 0; border-top: 1.5px dashed; }

<script>
const iIds=['n-parse','n-queue','n-orch','n-docstore','n-chunk','n-embed-i','n-embed-api',
            'n-vecwrite','n-kwidxw','n-metawrite2','icon-admin',
            'ai-down','ai-q','ai-orch-a','ai-todoc','ai-chunk-a','ai-tometa',
            'ai-emb','ai-embcloud','ai-vecw','ai-kwwrite'];
const qIds=['n-gw','n-auth','n-cache','n-embq','n-embed-api-q','n-vsearch','n-vecread',
            'n-kwread','n-metaread','n-docread','n-rerank','n-fallback','n-ctx','n-llm',
            'n-formatter-real','n-ans','obs1','obs2','obs3','obs4','obs5',
            'icon-user','qu-gw','qu-ac-a','qu-cache-a','qu-emb-a','qu-embcloud',
            'qu-vsearch-a','qu-vread','qu-kwread','qu-metaread-a','qu-docread',
            'qu-rerank-a','qu-fb-a','qu-llm-a','qu-ctx-a','qu-llm-b','qu-back',
            'qu-final','qu-hit','obs-cache','obs-rerank','obs-fb'];

function show(m){
  document.getElementById('tb').className='tog'+(m==='both'?' b':'');
  document.getElementById('ta').className='tog'+(m==='ingest'?' a':'');
  document.getElementById('tq').className='tog'+(m==='query'?' q':'');
  [...iIds,...qIds].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(m==='both')el.style.opacity='1';
    else if(m==='ingest')el.style.opacity=iIds.includes(id)?'1':'0.1';
    else el.style.opacity=qIds.includes(id)?'1':'0.1';
  });
}
</script>
